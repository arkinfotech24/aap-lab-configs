global
    log /dev/log local0
    log /dev/log local1 notice
    maxconn 20000
    daemon

defaults
    log global
    option dontlognull
    timeout connect 10s
    timeout client 300s
    timeout server 300s

# ============================================================
# OpenShift TCP load balancer
# Keep these only if those backend nodes really exist and are up
# ============================================================

frontend ocp_api
    mode tcp
    bind 192.168.1.180:6443
    default_backend ocp_api_backend

backend ocp_api_backend
    mode tcp
    balance roundrobin
    option tcp-check
    server bootstrap 192.168.1.182:6443 check
    server master-1  192.168.1.183:6443 check
    server master-2  192.168.1.184:6443 check
    server master-3  192.168.1.185:6443 check

frontend ocp_mcs
    mode tcp
    bind 192.168.1.180:22623
    default_backend ocp_mcs_backend

backend ocp_mcs_backend
    mode tcp
    balance roundrobin
    option tcp-check
    server bootstrap 192.168.1.182:22623 check
    server master-1  192.168.1.183:22623 check
    server master-2  192.168.1.184:22623 check
    server master-3  192.168.1.185:22623 check

frontend ocp_http
    mode tcp
    bind 192.168.1.181:80
    default_backend ocp_http_backend

backend ocp_http_backend
    mode tcp
    balance source
    option tcp-check
    server worker-1 192.168.1.186:80 check
    server worker-2 192.168.1.187:80 check

frontend ocp_https
    mode tcp
    bind 192.168.1.181:443
    default_backend ocp_https_backend

backend ocp_https_backend
    mode tcp
    balance source
    option tcp-check
    server worker-1 192.168.1.186:443 check
    server worker-2 192.168.1.187:443 check

# ============================================================
# Homelab HTTP routing for single-node k3s on 192.168.1.170
# Use 8080/8443 so HAProxy does not conflict with Traefik on 80/443
# ============================================================
frontend homelab_http
    mode http
    bind 192.168.1.170:8080

    acl host_argocd     hdr_dom(host) -i argocd.home.lab
    acl host_grafana    hdr_dom(host) -i grafana.home.lab
    acl host_prometheus hdr_dom(host) -i prometheus.home.lab
    acl host_mission    hdr_dom(host) -i mission.home.lab

    http-request redirect scheme https code 301 if host_argocd
    use_backend grafana_backend if host_grafana
    use_backend prometheus_backend if host_prometheus
    use_backend mission_backend if host_mission
    default_backend default_http_backend

backend grafana_backend
    mode http
    option httpchk GET /login
    server grafana1 192.168.1.170:30060 check

backend prometheus_backend
    mode http
    option httpchk GET /-/healthy
    server prometheus1 192.168.1.170:30061 check

backend mission_backend
    mode http
    option httpchk GET /
    server mission1 192.168.1.170:30080 check

backend default_http_backend
    mode http
    http-request return status 404 content-type text/plain lf-string "No matching virtual host\n"

# ============================================================
# ArgoCD HTTPS passthrough
# Use 8443 so HAProxy does not conflict with Traefik on 443
# ============================================================

frontend homelab_https
    mode tcp
    bind 192.168.1.170:8443
    tcp-request inspect-delay 5s
    tcp-request content accept if { req.ssl_hello_type 1 }
    use_backend argocd_https_backend if { req.ssl_sni -i argocd.home.lab }
    default_backend default_https_backend

backend argocd_https_backend
    mode tcp
    option tcp-check
    server argocd1 192.168.1.170:30707 check

backend default_https_backend
    mode tcp
    tcp-request content reject

# ============================================================
# Automation Platform (Controller + Hub) behind HAProxy
# Exposed on non-conflicting ports on 192.168.1.181
# Internal NGINX: 192.168.1.170:8444 (HTTPS), 8081 (HTTP)
# ============================================================

# Automation Controller - HTTPS (external 444 -> internal 8444)
frontend aap_controller_https
    mode tcp
    bind 192.168.1.181:444
    option tcplog
    default_backend aap_controller_backend

backend aap_controller_backend
    mode tcp
    #option ssl-hello-chk
    server controller 192.168.1.170:8445 check

# Automation Controller - HTTP (external 81 -> internal 8081)
frontend aap_controller_http
    mode tcp
    bind 192.168.1.181:81
    option tcplog
    default_backend aap_controller_http_backend

backend aap_controller_http_backend
    mode tcp
    server controller 192.168.1.170:8081 check

# Automation Hub - HTTPS (external 445 -> internal 8444)
frontend aap_hub_https
    mode tcp
    bind 192.168.1.181:445
    option tcplog
    default_backend aap_hub_backend

backend aap_hub_backend
    mode tcp
    #option ssl-hello-chk
    server hub 192.168.1.170:8444 check

# Automation Hub - HTTP (external 82 -> internal 8081)
frontend aap_hub_http
    mode tcp
    bind 192.168.1.181:82
    option tcplog
    default_backend aap_hub_http_backend

backend aap_hub_http_backend
    mode tcp
    server hub 192.168.1.170:8081 check


# Automation Hub registry - standard HTTPS port for installer
frontend aap_hub_registry
    mode tcp
    bind 192.168.1.170:4450
    option tcplog
    default_backend aap_hub_backend
